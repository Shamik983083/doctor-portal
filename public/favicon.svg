<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#091929"/>
    </linearGradient>
    <linearGradient id="cross" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#29C8EC"/>
      <stop offset="100%" stop-color="#0097B8"/>
    </linearGradient>
  </defs>
  <!-- Dark navy rounded background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Medical cross — vertical bar -->
  <rect x="13" y="5" width="6" height="22" rx="2" fill="url(#cross)"/>
  <!-- Medical cross — horizontal bar -->
  <rect x="5" y="13" width="22" height="6" rx="2" fill="url(#cross)"/>
  <!-- Bright highlight at the intersection for depth -->
  <rect x="13" y="13" width="6" height="6" fill="#4DD8F0"/>
  <!-- Subtle top-left corner shine -->
  <circle cx="7" cy="7" r="1.5" fill="#00B4D8" opacity="0.25"/>
</svg>
