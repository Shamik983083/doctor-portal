name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to staging.axismd.io
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd /home/axismd/public_html/staging_doctor_portal

            echo "--- Pulling latest code ---"
            git fetch origin staging
            git reset --hard origin/staging

            echo "--- Installing dependencies ---"
            /opt/cpanel/ea-php82/root/usr/bin/php composer.phar install --no-dev --optimize-autoloader --no-interaction

            echo "--- Running migrations ---"
            /opt/cpanel/ea-php82/root/usr/bin/php artisan migrate --force

            echo "--- Clearing and rebuilding caches ---"
            /opt/cpanel/ea-php82/root/usr/bin/php artisan config:cache
            /opt/cpanel/ea-php82/root/usr/bin/php artisan route:cache
            /opt/cpanel/ea-php82/root/usr/bin/php artisan view:cache

            echo "--- Deployment complete ---"
